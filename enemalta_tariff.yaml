# ============================================================================
# Enemalta Tariff Cost Calculator — Home Assistant Package
# ============================================================================
# Calculates the running cost of electricity consumption against Enemalta's
# (Malta) Residential, Domestic and Non-Residential cumulative band tariffs.
#
# Project:  https://github.com/YOUR_USERNAME/ha-enemalta-tariff
# Licence:  MIT
# Source:   Rates transcribed from enemalta.com.mt — see RATES SECTION below
#           for the exact pages and the Enemalta revision date they match.
#
# ⚠ INFORMATION ONLY. Verify against your ARMS bill. In any discrepancy the
#   Electricity Connection and Supply Regulations (S.L.545.41) prevail.
# ----------------------------------------------------------------------------
# QUICK INSTALL — see README.md for full details.
#   1. Copy this file to:  <config>/packages/enemalta_tariff.yaml
#   2. In configuration.yaml:
#        homeassistant:
#          packages: !include_dir_named packages
#   3. Set `source:` in the utility_meter (below) to YOUR energy sensor.
#   4. If your sensor reads in Wh not kWh, enable the converter (Section B).
#   5. Restart HA, then set the helpers (Settings > Devices & Services >
#      Helpers).
# ============================================================================


# ╔══════════════════════════════════════════════════════════════════════╗
# ║  RATES SECTION — EDIT HERE WHEN ENEMALTA CHANGES TARIFFS               ║
# ║  Matches Enemalta pages as revised: 2026-02-06 (Res/Dom),             ║
# ║  2026-04-24 (Non-Res). Update CHANGELOG.md when you change these.     ║
# ║                                                                        ║
# ║  These are documented here for maintainers. The actual values live    ║
# ║  in the template below (Jinja can't read top-level YAML anchors into  ║
# ║  templates), so update BOTH this reference block AND the template.    ║
# ║                                                                        ║
# ║  RESIDENTIAL (incl. 5% VAT)          DOMESTIC (incl. 5% VAT)          ║
# ║   0–2,000      0.1047                 0–2,000      0.1365             ║
# ║   2,001–6,000  0.1298                 2,001–6,000  0.1673             ║
# ║   6,001–10,000 0.1607                 6,001–10,000 0.2023             ║
# ║   10,001–20,000 0.3420                10,001–20,000 0.4180            ║
# ║   20,001+      0.6076                 20,001+      0.6860             ║
# ║                                                                        ║
# ║  NON-RESIDENTIAL kWh (excl. VAT)                                       ║
# ║   0–2,000 0.1215 | 2,001–6,000 0.1275 | 6,001–10,000 0.1373          ║
# ║   10,001–20,000 0.1485 | 20,001–60,000 0.1613 | 60,001–100,000 0.1500║
# ║   100,001–1,000,000 0.1403 | 1,000,001–5,000,000 0.1275 | 5M+ 0.1080 ║
# ║                                                                        ║
# ║  RESIDENTIAL ECO-REDUCTION (primary residence only):                  ║
# ║   1 person:  25% on all consumption IF annual < 2,000 units          ║
# ║   2+ people (if annual <= 1,750/person): 25% on first 1,000 units,   ║
# ║             15% on next 750 units                                     ║
# ╚══════════════════════════════════════════════════════════════════════╝


# ---------------------------------------------------------------------------
# SECTION A — CONFIG HELPERS (auto-created; set values in the UI)
# ---------------------------------------------------------------------------
input_select:
  enemalta_tariff_type:
    name: Enemalta Tariff Type
    options:
      - Residential
      - Domestic
      - Non-Residential
    initial: Residential
    icon: mdi:transmission-tower

input_number:
  enemalta_residents:
    name: Enemalta Registered Residents
    min: 0
    max: 20
    step: 1
    initial: 2
    mode: box
    icon: mdi:account-group

  enemalta_vat_percent:
    name: Enemalta VAT Percent (Non-Residential only)
    min: 0
    max: 25
    step: 0.5
    initial: 18
    unit_of_measurement: "%"
    mode: box
    icon: mdi:percent

input_boolean:
  enemalta_primary_residence:
    name: Enemalta Primary Residence (Eco-Reduction eligible)
    initial: true
    icon: mdi:home-heart


# ---------------------------------------------------------------------------
# SECTION B — OPTIONAL Wh→kWh CONVERTER
# ---------------------------------------------------------------------------
# If your energy sensor reports in Wh (e.g. many LocalTuya / Tuya plugs),
# uncomment this block and point the utility_meter (Section C) at
# sensor.energy_kwh_for_enemalta instead of your raw sensor.
# Change the source entity_id below to YOUR Wh sensor.
# ---------------------------------------------------------------------------
# template:
#   - sensor:
#       - name: "Energy kWh for Enemalta"
#         unique_id: energy_kwh_for_enemalta
#         unit_of_measurement: "kWh"
#         device_class: energy
#         state_class: total_increasing
#         availability: >
#           {{ states('sensor.CHANGE_ME_wh_sensor') not in
#              ['unknown','unavailable','none'] }}
#         state: >
#           {{ (states('sensor.CHANGE_ME_wh_sensor') | float(0) / 1000)
#              | round(3) }}


# ---------------------------------------------------------------------------
# SECTION C — UTILITY METER (tracks consumption within the billing YEAR)
# ---------------------------------------------------------------------------
# CHANGE `source:` to your cumulative kWh sensor. If using the converter
# above, set it to: sensor.energy_kwh_for_enemalta
# `offset:` shifts the cycle start if your ARMS billing year != 1 Jan.
# ---------------------------------------------------------------------------
utility_meter:
  enemalta_yearly_energy:
    source: sensor.CHANGE_ME_total_energy_kwh
    cycle: yearly
    # offset: { days: 0 }


# ---------------------------------------------------------------------------
# SECTION D — COST CALCULATION ENGINE (no need to edit unless rates change)
# ---------------------------------------------------------------------------
template:
  - sensor:
      - name: "Enemalta Electricity Cost"
        unique_id: enemalta_electricity_cost
        unit_of_measurement: "€"
        device_class: monetary
        state_class: total
        icon: mdi:cash-multiple
        availability: >
          {{ states('sensor.enemalta_yearly_energy') not in
             ['unknown','unavailable','none'] }}
        state: >
          {% set kwh = states('sensor.enemalta_yearly_energy') | float(0) %}
          {% set ttype = states('input_select.enemalta_tariff_type') %}
          {% set residents = states('input_number.enemalta_residents') | int(0) %}
          {% set primary = is_state('input_boolean.enemalta_primary_residence','on') %}
          {% set vat = states('input_number.enemalta_vat_percent') | float(0) %}

          {% if ttype == 'Residential' %}
            {% set bands = [[2000,0.1047],[6000,0.1298],[10000,0.1607],
                            [20000,0.3420],[10**12,0.6076]] %}
            {% set apply_vat = false %}
          {% elif ttype == 'Domestic' %}
            {% set bands = [[2000,0.1365],[6000,0.1673],[10000,0.2023],
                            [20000,0.4180],[10**12,0.6860]] %}
            {% set apply_vat = false %}
          {% else %}
            {% set bands = [[2000,0.1215],[6000,0.1275],[10000,0.1373],
                            [20000,0.1485],[60000,0.1613],[100000,0.1500],
                            [1000000,0.1403],[5000000,0.1275],[10**12,0.1080]] %}
            {% set apply_vat = true %}
          {% endif %}

          {% set ns = namespace(cost=0.0, lower=0.0) %}
          {% for b in bands %}
            {% if kwh > ns.lower %}
              {% set seg = [kwh, b[0]] | min - ns.lower %}
              {% set ns.cost = ns.cost + seg * b[1] %}
              {% set ns.lower = b[0] %}
            {% endif %}
          {% endfor %}

          {% set ns2 = namespace(eco=0.0) %}
          {% if ttype == 'Residential' and primary and residents >= 1 %}
            {% set day = now().timetuple().tm_yday %}
            {% set annual_est = kwh / day * 365 if day > 0 else kwh %}
            {% set frac = kwh / annual_est if annual_est > 0 else 0 %}
            {% set band1_rate = 0.1047 %}
            {% if residents == 1 %}
              {% if annual_est < 2000 %}
                {% set elig = [kwh, 2000] | min %}
                {% set ns2.eco = elig * band1_rate * 0.25 %}
              {% endif %}
            {% else %}
              {% set cap = 1750 * residents %}
              {% if annual_est <= cap %}
                {% set disc1 = [annual_est, 1000] | min %}
                {% set disc2 = [[annual_est - 1000, 750] | min, 0] | max %}
                {% set annual_eco = disc1 * band1_rate * 0.25
                                  + disc2 * band1_rate * 0.15 %}
                {% set ns2.eco = annual_eco * frac %}
              {% endif %}
            {% endif %}
          {% endif %}

          {% set subtotal = ns.cost - ns2.eco %}
          {% if apply_vat %}
            {% set subtotal = subtotal * (1 + vat / 100) %}
          {% endif %}
          {{ subtotal | round(2) }}

        attributes:
          tariff_type: "{{ states('input_select.enemalta_tariff_type') }}"
          consumption_kwh_ytd: "{{ states('sensor.enemalta_yearly_energy') | float(0) | round(1) }}"
          gross_cost_eur: >
            {% set kwh = states('sensor.enemalta_yearly_energy') | float(0) %}
            {% set ttype = states('input_select.enemalta_tariff_type') %}
            {% if ttype == 'Residential' %}
              {% set bands = [[2000,0.1047],[6000,0.1298],[10000,0.1607],[20000,0.3420],[10**12,0.6076]] %}
            {% elif ttype == 'Domestic' %}
              {% set bands = [[2000,0.1365],[6000,0.1673],[10000,0.2023],[20000,0.4180],[10**12,0.6860]] %}
            {% else %}
              {% set bands = [[2000,0.1215],[6000,0.1275],[10000,0.1373],[20000,0.1485],[60000,0.1613],[100000,0.1500],[1000000,0.1403],[5000000,0.1275],[10**12,0.1080]] %}
            {% endif %}
            {% set ns = namespace(cost=0.0, lower=0.0) %}
            {% for b in bands %}
              {% if kwh > ns.lower %}
                {% set seg = [kwh, b[0]] | min - ns.lower %}
                {% set ns.cost = ns.cost + seg * b[1] %}
                {% set ns.lower = b[0] %}
              {% endif %}
            {% endfor %}
            {{ ns.cost | round(2) }}
          current_band: >
            {% set kwh = states('sensor.enemalta_yearly_energy') | float(0) %}
            {% set ttype = states('input_select.enemalta_tariff_type') %}
            {% if ttype == 'Non-Residential' %}
              {% set edges = [2000,6000,10000,20000,60000,100000,1000000,5000000] %}
            {% else %}
              {% set edges = [2000,6000,10000,20000] %}
            {% endif %}
            {% set ns = namespace(band=1) %}
            {% for e in edges %}
              {% if kwh > e %}{% set ns.band = loop.index + 1 %}{% endif %}
            {% endfor %}
            {{ ns.band }}
          note: >
            Residential/Domestic rates incl. 5% VAT. Non-Residential excl. VAT
            (VAT added per helper). Eco-Reduction is an annualised estimate.
            Bands reset on the billing-year cycle of the utility_meter.
